# install       pip3 install prek
# run           prek run -a  # or --all-files
# update deps   prek autoupdate

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: check-builtin-literals
      - id: check-docstring-first
      - id: debug-statements
      - id: forbid-new-submodules
      - id: name-tests-test
        args: ["--pytest-test-first"]
      - id: requirements-txt-fixer

  - repo: builtin # preks faster versions
    hooks:
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: check-json
      - id: check-json5
      - id: pretty-format-json
        args: ["--autofix"]
      - id: check-toml
      - id: check-yaml
      - id: check-xml
      - id: mixed-line-ending
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-merge-conflict
      - id: detect-private-key
      # - id: no-commit-to-branch
      - id: check-executables-have-shebangs

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
      - id: python-use-type-annotations
      - id: python-no-log-warn
      - id: rst-backticks
      - id: rst-directive-colons
      - id: rst-inline-touching-normal
      - id: text-unicode-replacement-char


  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 'v0.15.12'
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: ["--disable", "MD013"] # ignore line length

  - repo: https://github.com/codespell-project/codespell
    rev: "v2.4.2"
    hooks:
      - id: codespell
        exclude: \.(sch|brd|lbr)$

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.24.1
    hooks:
      - id: zizmor
        args: ["--min-severity", "high", "--no-progress", "--fix", "."]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: 'v22.1.4'
    hooks:
      - id: clang-format
        types_or: [c++, c]
        exclude: ^.*nrf52_rf_survey\/trafficbench\/target\/gpi\/platform_spec\.h
  # cpp-check comes last! fails if uninstalled
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: "v1.3.5"
    hooks:
      - id: cppcheck
        args:
          - "--enable=all"
          - "--std=c99"
          - "--platform=unix32"
          - "--verbose"
          - "-q"
          - "--max-ctu-depth=10"
          - "--suppress=unusedFunction"
          - "--suppress=variableScope"
          - "--suppress=unreadVariable"
          - "--suppress=missingInclude"
          - "--suppress=missingIncludeSystem"
          - "--suppress=unmatchedSuppression"
          - "--suppress=constParameterCallback"
          - "--suppress=knownConditionTrueFalse"
        exclude: ^.*nrf52_rf_survey\/trafficbench.*$

#     - id: clang-tidy
#       args: [ "-checks=bugprone-,cert-,performance-,portability-"]
