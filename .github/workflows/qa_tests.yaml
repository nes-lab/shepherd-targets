name: QA-Tests

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
      - name: Install dependencies 🔧
        run: sudo apt install cppcheck
        # NOTE: cppcheck is needed for pre-commit
      - name: Run Pre-Commit Tests 🧪
        uses: j178/prek-action@v2
